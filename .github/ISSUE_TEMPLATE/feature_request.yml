name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which area does this feature affect?
      options:
        - New agent or agent tool
        - Existing agent improvement
        - Data extraction / fallback logic
        - Report generation (Word, PPTX)
        - Clinical trials search
        - NCCN guidelines
        - Infrastructure / deployment
        - Teams / Copilot integration
        - Developer experience
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see? Why is it useful for tumor board preparation?
    validations:
      required: true

  - type: textarea
    id: approach
    attributes:
      label: Suggested Approach
      description: If you have an idea for how to implement this, describe it here.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - "P1 - Blocks clinical use"
        - "P2 - Important for completeness"
        - "P3 - Nice to have"
