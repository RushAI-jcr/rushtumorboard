name: Bug Report
description: Report a bug in the tumor board agent system
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the system is affected?
      options:
        - Agent orchestration (group_chat.py)
        - Patient data extraction (PatientHistory, Pathology, Radiology)
        - Clinical synthesis (PatientStatus, ClinicalGuidelines, ClinicalTrials)
        - Report generation (Word doc, PPTX)
        - Data access layer (Epic Caboodle, FHIR, Fabric)
        - MCP server (clinical trials)
        - Teams bot integration
        - React client (democlient)
        - Infrastructure / deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **What happened:**

        **Expected behavior:**
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Start tumor board review for patient_gyn_001
        2. ...
        3. Observe error in ...

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error messages or log output (redact any PHI)
      render: shell

  - type: input
    id: patient
    attributes:
      label: Patient ID (synthetic only)
      description: If applicable, which synthetic patient ID reproduces this? Do NOT enter real patient IDs.
      placeholder: "patient_gyn_001"

  - type: dropdown
    id: data_source
    attributes:
      label: Data Source
      options:
        - caboodle (local CSV)
        - blob (Azure Storage)
        - fhir (Azure Health Data Services)
        - fabric (Microsoft Fabric)
        - N/A
