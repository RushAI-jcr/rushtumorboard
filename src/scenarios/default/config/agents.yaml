  max_completion_tokens: 8192
  description: |
    A MedicalResearch agent for GYN tumor board. **You provide**: evidence-based literature review on GYN oncology topics using PubMed, Europe PMC, and Semantic Scholar. **You need**: a clinical research question or topic to search for.
